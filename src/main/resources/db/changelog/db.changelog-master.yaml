databaseChangeLog:

  - changeSet:
      id: "add-seed-data-and-indexes"
      author: "developer"
      changes:
        - insert:
            tableName: menu_items
            columns:
              - column:
                  name: name
                  value: "Latte"
              - column:
                  name: description
                  value: "Classic Italian coffee"
              - column:
                  name: price
                  value: 4.99
              - column:
                  name: category
                  value: "COFFEE"
                  
        - insert:
            tableName: waiters
            columns:
              - column:
                  name: name
                  value: "John Doe"

        - createIndex:
            tableName: orders
            indexName: idx_order_status
            columns:
              - column:
                  name: status
                  
        - createIndex:
            tableName: orders
            indexName: idx_order_customer
            columns:
              - column:
                  name: customer_id

        - createIndex:
            tableName: orders
            indexName: idx_order_waiter
            columns:
              - column:
                  name: waiter_id

  - changeSet:
      id: 1
      author: javafag
      changes:
        - createTable:
            tableName: customers
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2
      author: javafag
      changes:
        - createTable:
            tableName: waiters
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: varchar(255)

  - changeSet:
      id: 3
      author: javafag
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: drink_name
                  type: varchar(255)
              - column:
                  name: status
                  type: varchar(255)
              - column:
                  name: price
                  type: numeric(19, 2)
              - column:
                  name: customer_id
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_order_customer
                    referencedTableName: customers
                    referencedColumnNames: id
              - column:
                  name: waiter_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_order_waiter
                    referencedTableName: waiters
                    referencedColumnNames: id

  - include:
      file: db/changelog/v2__create_users_table.xml
  - include:
      file: db/changelog/v3__create_menu_items_table.xml
  - include:
      file: db/changelog/v4__create_order_items_table.xml
  - include:
      file: db/changelog/v5__add_user_columns.xml
