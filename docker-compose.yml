version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coffee-shop-db
    environment:
      POSTGRES_DB: coffee_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1337"
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Якщо файла init-db.sql немає фізично, закоментуй рядок нижче
      # - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - coffee-shop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coffee-shop-api
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coffee_shop
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "1337"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - coffee-shop-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: coffee-shop-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - coffee-shop-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: coffee-shop-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      - coffee-shop-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coffee-shop-redis
    ports:
      - "6379:6379"
    networks:
      - coffee-shop-network
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  coffee-shop-network:
    driver: bridge